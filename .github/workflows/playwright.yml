name: Playwright Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npx playwright install --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

  publish-report:
    needs: test
    # "github-pages" environment is auto-created by GitHub once Pages source is
    # set to "GitHub Actions" in Settings → Pages. The IDE may warn before that
    # first-time setup — it is a false positive and safe to ignore.
    if: always() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/
      - name: Fetch Allure history from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || exit 0
          mkdir -p allure-results/history
          git archive FETCH_HEAD history/ 2>/dev/null | tar -x -C allure-results/ 2>/dev/null || true
      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
      - name: Add report link to job summary
        run: echo "## Allure Report" >> $GITHUB_STEP_SUMMARY && echo "[Open report](${{ steps.deploy.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
